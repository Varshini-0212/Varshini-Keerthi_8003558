<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Box Model & Layout Control</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>

        Community Event Cards

    </h1>

    <!-- Event Card 1 -->

    <div class="eventCard">

        <h2>Music Festival</h2>

        <p>
            Enjoy live concerts and performances.
        </p>

    </div>

    <!-- Event Card 2 -->

    <div class="eventCard">

        <h2>Sports Meet</h2>

        <p>
            Participate in exciting competitions.
        </p>

    </div>

    <!-- Form -->

    <form>

        <label>Name</label>

        <input
            type="text"
            placeholder="Enter your name">

        <label>Email</label>

        <input
            type="email"
            placeholder="Enter your email">

    </form>

    <!-- Visibility Example -->

    <div class="hiddenBox">

        visibility: hidden

    </div>

    <div class="noneBox">

        display: none

    </div>

</body>
</html>
