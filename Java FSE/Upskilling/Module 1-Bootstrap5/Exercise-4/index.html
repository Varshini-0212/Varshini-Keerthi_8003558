<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Column Layouts and Grid Classes
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .content-box {

            background-color: #ffffff;

            padding: 40px;

            border-radius: 12px;

            text-align: center;

            font-size: 22px;

            font-weight: bold;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Bootstrap Grid Layouts

            </h1>

            <!-- Two Column Layout -->

            <div class="row g-4 mb-5">

                <!-- Sidebar -->

                <div class="col-md-3">

                    <div class="content-box">

                        Sidebar

                    </div>

                </div>

                <!-- Main Content -->

                <div class="col-md-9">

                    <div class="content-box">

                        Main Content Area

                    </div>

                </div>

            </div>

            <!-- Four Column Layout -->

            <div class="row g-4">

                <div class="col-sm-3">

                    <div class="content-box">

                        Column 1

                    </div>

                </div>

                <div class="col-sm-3">

                    <div class="content-box">

                        Column 2

                    </div>

                </div>

                <div class="col-sm-3">

                    <div class="content-box">

                        Column 3

                    </div>

                </div>

                <div class="col-sm-3">

                    <div class="content-box">

                        Column 4

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
