<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Alignment and Reordering
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .content-box {

            background-color: #ffffff;

            padding: 40px;

            border-radius: 12px;

            text-align: center;

            font-size: 22px;

            font-weight: bold;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

        .center-row {

            height: 300px;

        }

    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Alignment and Reordering

            </h1>

            <!-- Center Alignment -->

            <div class="
                row
                justify-content-center
                align-items-center
                center-row
                g-4
                mb-5
            ">

                <div class="col-md-4">

                    <div class="content-box">

                        Centered Box 1

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="content-box">

                        Centered Box 2

                    </div>

                </div>

            </div>

            <!-- Reordering Columns -->

            <div class="row g-4">

                <!-- Content -->

                <div class="col-md-6 order-md-2">

                    <div class="content-box">

                        Main Content

                    </div>

                </div>

                <!-- Sidebar -->

                <div class="col-md-6 order-md-1">

                    <div class="content-box">

                        Sidebar

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
