<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Responsive Flexbox Utilities
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .navbar-box {

            background-color: #ffffff;

            padding: 20px;

            border-radius: 12px;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

        .card-box {

            background-color: #ffffff;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Responsive Flexbox Utilities

            </h1>

            <!-- Responsive Navbar -->

            <div class="
                navbar-box
                d-flex
                flex-column
                flex-md-row
                justify-content-between
                align-items-center
                mb-5
            ">

                <h2 class="mb-3 mb-md-0">

                    MyWebsite

                </h2>

                <div>

                    <button class="btn btn-primary m-1">

                        Home

                    </button>

                    <button class="btn btn-success m-1">

                        About

                    </button>

                    <button class="btn btn-danger m-1">

                        Contact

                    </button>

                </div>

            </div>

            <!-- Card Layout -->

            <div class="
                card-box
                d-flex
                justify-content-between
                align-items-center
            ">

                <div>

                    <h3>

                        Responsive Card Layout

                    </h3>

                    <p class="mb-0">

                        Flexbox utilities align and distribute content properly.

                    </p>

                </div>

                <button class="btn btn-dark">

                    Explore

                </button>

            </div>

        </div>

    </div>

</body>

</html>
