<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Bootstrap Icons
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 50px;

            border-radius: 20px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .icon-btn {

            width: 60px;

            height: 60px;

            border-radius: 50%;

            font-size: 24px;

        }

        footer {

            border-radius: 20px;

        }

    </style>

</head>

<body>

    <div class="container py-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Bootstrap Icons

            </h1>

            <!-- Icon Buttons -->

            <div class="text-center mb-5">

                <button class="
                    btn
                    btn-primary
                    icon-btn
                    m-2
                ">

                    <i class="bi bi-house-fill"></i>

                </button>

                <button class="
                    btn
                    btn-success
                    icon-btn
                    m-2
                ">

                    <i class="bi bi-search"></i>

                </button>

                <button class="
                    btn
                    btn-danger
                    icon-btn
                    m-2
                ">

                    <i class="bi bi-heart-fill"></i>

                </button>

                <button class="
                    btn
                    btn-dark
                    icon-btn
                    m-2
                ">

                    <i class="bi bi-person-fill"></i>

                </button>

            </div>

            <hr class="my-5">

            <!-- Social Media Footer -->

            <footer class="
                bg-dark
                text-white
                text-center
                py-4
                shadow-lg
            ">

                <h3 class="mb-4">

                    Follow Us

                </h3>

                <div>

                    <a
                    href="#"
                    class="text-white fs-2 mx-3">

                        <i class="bi bi-facebook"></i>

                    </a>

                    <a
                    href="#"
                    class="text-white fs-2 mx-3">

                        <i class="bi bi-instagram"></i>

                    </a>

                    <a
                    href="#"
                    class="text-white fs-2 mx-3">

                        <i class="bi bi-twitter-x"></i>

                    </a>

                    <a
                    href="#"
                    class="text-white fs-2 mx-3">

                        <i class="bi bi-linkedin"></i>

                    </a>

                </div>

            </footer>

        </div>

    </div>

</body>

</html>
