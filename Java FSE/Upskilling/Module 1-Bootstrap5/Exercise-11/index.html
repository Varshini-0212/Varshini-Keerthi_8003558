<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Cards and Media Objects
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .media-image {

            width: 140px;

            height: 140px;

            object-fit: cover;

            border-radius: 12px;

        }

    </style>

</head>

<body>

    <div class="container mt-5 mb-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Cards and Media Objects

            </h1>

            <!-- Profile Card -->

            <div class="row justify-content-center mb-5">

                <div class="col-md-4">

                    <div class="card shadow-lg border-0">

                        <!-- Card Image -->

                        <img
                        src="https://picsum.photos/400/250"
                        class="card-img-top"
                        alt="Profile Image">

                        <!-- Card Body -->

                        <div class="card-body text-center">

                            <!-- Card Title -->

                            <h3 class="card-title text-primary">

                                Varshini

                            </h3>

                            <p class="card-text">

                                Frontend Developer passionate about Bootstrap and responsive web design.

                            </p>

                            <button class="btn btn-primary">

                                View Profile

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <hr class="my-5">

            <!-- Media Object Layout -->

            <div class="
                d-flex
                align-items-center
                bg-light
                p-4
                rounded
                shadow
            ">

                <!-- Left Image -->

                <img
                src="https://picsum.photos/200"
                class="media-image me-4"
                alt="Media Image">

                <!-- Content -->

                <div>

                    <h3 class="text-success">

                        Media Object Layout

                    </h3>

                    <p>

                        This layout aligns an image to the left side of the content using Bootstrap Flexbox utilities.

                    </p>

                    <button class="btn btn-success">

                        Learn More

                    </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
