<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Spacing Utilities
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .pricing-card {

            background-color: #ffffff;

            border-radius: 15px;

            transition: 0.3s;

        }

        .pricing-card:hover {

            transform: translateY(-5px);

        }

    </style>

</head>

<body>

    <!-- Main Section -->

    <div class="container py-5">

        <div class="main-box p-4">

            <h1 class="text-center text-primary mb-5">

                Pricing Plans

            </h1>

            <!-- Pricing Row -->

            <div class="row">

                <!-- Basic Plan -->

                <div class="col-md-4">

                    <div class="
                        pricing-card
                        shadow
                        m-3
                        p-4
                        text-center
                    ">

                        <h2 class="mb-3">

                            Basic

                        </h2>

                        <h1 class="text-primary">

                            ₹499

                        </h1>

                        <p class="mt-4">

                            Ideal for beginners and students.

                        </p>

                        <button class="btn btn-primary mt-3">

                            Choose Plan

                        </button>

                    </div>

                </div>

                <!-- Standard Plan -->

                <div class="col-md-4">

                    <div class="
                        pricing-card
                        shadow-lg
                        m-3
                        p-4
                        text-center
                    ">

                        <h2 class="mb-3">

                            Standard

                        </h2>

                        <h1 class="text-success">

                            ₹999

                        </h1>

                        <p class="mt-4">

                            Best for professionals and developers.

                        </p>

                        <button class="btn btn-success mt-3">

                            Choose Plan

                        </button>

                    </div>

                </div>

                <!-- Premium Plan -->

                <div class="col-md-4">

                    <div class="
                        pricing-card
                        shadow
                        m-3
                        p-4
                        text-center
                    ">

                        <h2 class="mb-3">

                            Premium

                        </h2>

                        <h1 class="text-danger">

                            ₹1499

                        </h1>

                        <p class="mt-4">

                            Advanced features for enterprises.

                        </p>

                        <button class="btn btn-danger mt-3">

                            Choose Plan

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
