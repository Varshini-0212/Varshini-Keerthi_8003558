<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Bootstrap Forms
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

    </style>

</head>

<body>

    <div class="container mt-5 mb-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Bootstrap Forms

            </h1>

            <!-- Registration Form -->

            <h3 class="mb-4">

                Registration Form

            </h3>

            <!-- Name -->

            <div class="mb-3">

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter Full Name"
                >

            </div>

            <!-- Email Input Group -->

            <div class="input-group mb-3">

                <span class="input-group-text">

                    @

                </span>

                <input
                    type="email"
                    class="form-control"
                    placeholder="Enter Email Address"
                >

            </div>

            <!-- Password -->

            <div class="mb-3">

                <input
                    type="password"
                    class="form-control"
                    placeholder="Enter Password"
                >

            </div>

            <!-- Checkbox -->

            <div class="form-check mb-4">

                <input
                    class="form-check-input"
                    type="checkbox"
                    id="terms"
                >

                <label
                    class="form-check-label"
                    for="terms"
                >

                    Accept Terms and Conditions

                </label>

            </div>

            <!-- Register Button -->

            <button class="btn btn-primary w-100 mb-5">

                Register

            </button>

            <hr class="my-5">

            <!-- Login Form -->

            <h3 class="mb-4">

                Login Form

            </h3>

            <!-- Floating Email -->

            <div class="form-floating mb-3">

                <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Email"
                >

                <label for="email">

                    Email Address

                </label>

            </div>

            <!-- Floating Password -->

            <div class="form-floating mb-4">

                <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Password"
                >

                <label for="password">

                    Password

                </label>

            </div>

            <!-- Login Button -->

            <button class="btn btn-success w-100">

                Login

            </button>

        </div>

    </div>

</body>

</html>
