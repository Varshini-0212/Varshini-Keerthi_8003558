<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Colors and Backgrounds
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .dashboard-card {

            border-radius: 15px;

            padding: 40px;

            color: white;

            text-align: center;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

            transition: 0.3s;

        }

        .dashboard-card:hover {

            transform: translateY(-5px);

        }

        .gradient-section {

            border-radius: 15px;

            padding: 50px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

    </style>

</head>

<body>

    <div class="container py-5">

        <h1 class="text-center text-dark mb-5">

            Dashboard Overview

        </h1>

        <!-- Dashboard Cards -->

        <div class="row g-4 mb-5">

            <!-- Primary -->

            <div class="col-md-3">

                <div class="dashboard-card bg-primary">

                    <h2>

                        Users

                    </h2>

                    <h1>

                        1200

                    </h1>

                </div>

            </div>

            <!-- Warning -->

            <div class="col-md-3">

                <div class="dashboard-card bg-warning text-dark">

                    <h2>

                        Pending

                    </h2>

                    <h1>

                        85

                    </h1>

                </div>

            </div>

            <!-- Success -->

            <div class="col-md-3">

                <div class="dashboard-card bg-success">

                    <h2>

                        Sales

                    </h2>

                    <h1>

                        ₹75K

                    </h1>

                </div>

            </div>

            <!-- Danger -->

            <div class="col-md-3">

                <div class="dashboard-card bg-danger">

                    <h2>

                        Alerts

                    </h2>

                    <h1>

                        12

                    </h1>

                </div>

            </div>

        </div>

        <!-- Gradient Section -->

        <div class="
            gradient-section
            bg-dark
            bg-gradient
            text-white
            text-center
        ">

            <h1 class="mb-4">

                Analytics Dashboard

            </h1>

            <p class="lead">

                Bootstrap contextual backgrounds and gradients help create visually appealing user interfaces.

            </p>

            <button class="btn btn-light btn-lg mt-3">

                Explore Reports

            </button>

        </div>

    </div>

</body>

</html>
