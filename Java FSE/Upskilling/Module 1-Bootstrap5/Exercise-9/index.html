<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Bootstrap Buttons
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

    </style>

</head>

<body>

    <div class="container mt-5 mb-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Bootstrap Buttons

            </h1>

            <!-- Contextual Buttons -->

            <div class="mb-5">

                <button class="btn btn-primary m-2">

                    Primary

                </button>

                <button class="btn btn-secondary m-2">

                    Secondary

                </button>

                <button class="btn btn-success m-2">

                    Success

                </button>

                <button class="btn btn-danger m-2">

                    Danger

                </button>

                <button class="btn btn-warning m-2">

                    Warning

                </button>

                <button class="btn btn-info m-2">

                    Info

                </button>

                <button class="btn btn-dark m-2">

                    Dark

                </button>

            </div>

            <!-- Outline Buttons -->

            <div class="mb-5">

                <button class="btn btn-outline-primary m-2">

                    Outline Primary

                </button>

                <button class="btn btn-outline-success m-2">

                    Outline Success

                </button>

                <button class="btn btn-outline-danger m-2">

                    Outline Danger

                </button>

                <button class="btn btn-outline-dark m-2">

                    Outline Dark

                </button>

            </div>

            <hr class="my-5">

            <!-- Button Group -->

            <h3 class="mb-4">

                Button Group

            </h3>

            <div class="btn-group mb-5">

                <button class="btn btn-primary">

                    Left

                </button>

                <button class="btn btn-success">

                    Middle

                </button>

                <button class="btn btn-danger">

                    Right

                </button>

            </div>

            <!-- Toggle Buttons -->

            <h3 class="mb-4">

                Toggle Buttons

            </h3>

            <div class="btn-group" role="group">

                <input
                    type="checkbox"
                    class="btn-check"
                    id="music"
                    autocomplete="off"
                >

                <label
                    class="btn btn-outline-primary"
                    for="music"
                >

                    Music

                </label>

                <input
                    type="checkbox"
                    class="btn-check"
                    id="sports"
                    autocomplete="off"
                >

                <label
                    class="btn btn-outline-success"
                    for="sports"
                >

                    Sports

                </label>

                <input
                    type="checkbox"
                    class="btn-check"
                    id="coding"
                    autocomplete="off"
                >

                <label
                    class="btn btn-outline-danger"
                    for="coding"
                >

                    Coding

                </label>

            </div>

        </div>

    </div>

</body>

</html>
