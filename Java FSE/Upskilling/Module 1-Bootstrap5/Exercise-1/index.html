<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Bootstrap 5 Setup
    </title>

    <!-- Bootstrap CDN -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Uncomment below if using downloaded Bootstrap files -->

    <!--
    <link
    rel="stylesheet"
    href="bootstrap/css/bootstrap.min.css">
    -->

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 50px;

            border-radius: 15px;

            text-align: center;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="main-box">

            <h1 class="text-primary mb-4">

                Welcome to Bootstrap 5

            </h1>

            <p class="lead mb-4">

                Responsive design using Bootstrap CDN and local Bootstrap setup.

            </p>

            <button class="btn btn-success btn-lg me-3">

                Get Started

            </button>

            <button class="btn btn-outline-primary btn-lg">

                Learn More

            </button>

        </div>

    </div>

    <!-- Bootstrap JavaScript -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- Uncomment below if using local Bootstrap JS -->

    <!--
    <script
    src="bootstrap/js/bootstrap.bundle.min.js">
    </script>
    -->

</body>

</html>
