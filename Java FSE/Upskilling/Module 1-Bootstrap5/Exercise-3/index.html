<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Responsive Grid Layout
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .grid-box {

            background-color: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .column-box {

            background-color: #ffffff;

            padding: 50px;

            border-radius: 12px;

            text-align: center;

            font-size: 22px;

            font-weight: bold;

            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

    </style>

</head>

<body>

    <!-- Container -->

    <div class="container mt-5">

        <div class="grid-box">

            <h1 class="text-center text-primary mb-5">

                Responsive Grid Layout

            </h1>

            <!-- Row -->

            <div class="row g-4">

                <!-- Column 1 -->

                <div class="col-12 col-md-6 col-lg-4">

                    <div class="column-box">

                        Column 1

                    </div>

                </div>

                <!-- Column 2 -->

                <div class="col-12 col-md-6 col-lg-4">

                    <div class="column-box">

                        Column 2

                    </div>

                </div>

                <!-- Column 3 -->

                <div class="col-12 col-md-6 col-lg-4">

                    <div class="column-box">

                        Column 3

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
