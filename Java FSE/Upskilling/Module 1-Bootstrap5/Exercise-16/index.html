<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Positioning Utilities
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

            padding-bottom: 100px;

        }

        .main-box {

            background-color: white;

            padding: 50px;

            border-radius: 20px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .image-container {

            width: 300px;

        }

        .profile-image {

            width: 100%;

            border-radius: 20px;

        }

    </style>

</head>

<body>

    <div class="container py-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Positioning Utilities

            </h1>

            <!-- Relative and Absolute Position -->

            <div class="d-flex justify-content-center">

                <div class="
                    image-container
                    position-relative
                ">

                    <!-- Image -->

                    <img
                    src="https://picsum.photos/400"
                    alt="Profile"
                    class="profile-image shadow-lg">

                    <!-- Badge -->

                    <span class="
                        badge
                        bg-danger
                        position-absolute
                        top-0
                        start-100
                        translate-middle
                        rounded-pill
                        p-3
                    ">

                        New

                    </span>

                </div>

            </div>

        </div>

    </div>

    <!-- Fixed Footer -->

    <footer class="
        position-fixed
        bottom-0
        start-0
        w-100
        bg-dark
        text-white
        text-center
        py-3
        shadow-lg
    ">

        Bootstrap Positioning Utilities Footer

    </footer>

</body>

</html>
