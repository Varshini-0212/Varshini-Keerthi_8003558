<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Borders, Shadows and Rounded Corners
    </title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body {

            background-color: #eeb6b6;

        }

        .main-box {

            background-color: white;

            padding: 50px;

            border-radius: 20px;

            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);

        }

        .profile-image {

            width: 220px;

            height: 220px;

            object-fit: cover;

        }

        .custom-card {

            transition: 0.3s;

        }

        .custom-card:hover {

            transform: translateY(-5px);

        }

    </style>

</head>

<body>

    <div class="container py-5">

        <div class="main-box">

            <h1 class="text-center text-primary mb-5">

                Borders, Shadows & Rounded Corners

            </h1>

            <!-- Image Section -->

            <div class="text-center mb-5">

                <img
                src="https://picsum.photos/300"
                alt="Profile"
                class="
                    profile-image
                    border
                    border-primary
                    border-3
                    rounded-circle
                    shadow-lg
                ">

            </div>

            <hr class="my-5">

            <!-- Card Section -->

            <div class="row justify-content-center">

                <div class="col-md-6">

                    <div class="
                        card
                        custom-card
                        shadow-lg
                        border-0
                        rounded-pill
                        p-4
                        text-center
                    ">

                        <div class="card-body">

                            <h2 class="card-title text-success mb-4">

                                Premium Membership

                            </h2>

                            <p class="card-text lead">

                                Bootstrap utilities help create beautiful UI with borders, shadows, and rounded corners.

                            </p>

                            <button class="btn btn-success btn-lg rounded-pill mt-3">

                                Get Started

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
